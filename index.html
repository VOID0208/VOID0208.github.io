<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PT. Kencana Solusi Teknologi</title>
  <meta
    name="description"
    content="PT. Kencana Solusi Teknologi is a system integrator focused on networking infrastructure, IT hardware, and software solutions."
  />
  <style>
    :root {
      --navy: #0d3b66;
      --blue: #1f5faf;
      --red: #d62828;
      --text: #18324a;
      --muted: #5f7284;
      --line: #d9e1e8;
      --bg: #f7f9fc;
      --white: #ffffff;
      --shadow: 0 18px 50px rgba(13, 59, 102, 0.08);
      --radius: 22px;
      --max: 1150px;
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top right, rgba(31, 95, 175, 0.06), transparent 25%),
        radial-gradient(circle at bottom left, rgba(214, 40, 40, 0.05), transparent 20%),
        var(--bg);
      line-height: 1.6;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    img {
      max-width: 100%;
      display: block;
    }

    .container {
      width: min(var(--max), calc(100% - 32px));
      margin: 0 auto;
    }

    .section {
      padding: 82px 0;
    }

    .section-title {
      font-size: clamp(1.8rem, 3vw, 2.5rem);
      line-height: 1.15;
      margin: 0 0 14px;
      color: var(--navy);
    }

    .section-subtitle {
      max-width: 700px;
      margin: 0 0 36px;
      color: var(--muted);
      font-size: 1rem;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 50;
      background: rgba(247, 249, 252, 0.86);
      backdrop-filter: blur(14px);
      border-bottom: 1px solid rgba(13, 59, 102, 0.08);
    }

    .nav {
      min-height: 74px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .brand-badge {
      width: 42px;
      height: 42px;
      border-radius: 12px;
      background: linear-gradient(135deg, var(--navy), var(--blue));
      color: white;
      display: grid;
      place-items: center;
      font-weight: 700;
      box-shadow: 0 10px 24px rgba(31, 95, 175, 0.22);
      flex-shrink: 0;
    }

    .brand-text {
      min-width: 0;
    }

    .brand-text strong {
      display: block;
      color: var(--navy);
      font-size: 0.98rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .brand-text span {
      display: block;
      color: var(--muted);
      font-size: 0.82rem;
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 22px;
      flex-wrap: wrap;
    }

    .nav-links a {
      color: var(--muted);
      font-size: 0.95rem;
      transition: color 0.2s ease, transform 0.2s ease;
    }

    .nav-links a:hover {
      color: var(--navy);
      transform: translateY(-1px);
    }

      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10
